# =============================================================================
# Table de correspondance nom technique -> libelle lisible, utilisee par
# R/scaffold.R (st_scaffold_config()) pour pre-remplir le champ "libelle" du
# dictionnaire dans config.yml.
# =============================================================================
#
# Ce fichier est editable sans toucher au code R.
#
# Structure : chaque cle est un motif (chr), chaque valeur est le libelle
# francais (chr) a proposer.
#
# Correspondance : le nom de la variable est mis en minuscules puis decoupe
# en jetons sur tout caractere non alphanumerique (ex: "Date_Adm_Hopital"
# -> "date", "adm", "hopital"). Le motif est decoupe de la meme facon
# (ex: "date_adm" -> "date", "adm"). Si la sequence de jetons du motif
# apparait, dans le meme ordre et de maniere contigue, dans les jetons du
# nom de variable, le libelle correspondant est propose.
#
# En cas de plusieurs motifs correspondants pour une meme variable (ex:
# "date" et "date_adm" correspondent tous les deux a "date_adm_hopital"),
# le motif le plus specifique (le plus long) est retenu.
#
# Si aucun motif ne correspond, un libelle est tout de meme genere par
# mise en forme naive du nom (underscores remplaces par des espaces,
# premiere lettre en majuscule), et signale par un commentaire
# "# A VERIFIER" dans le config.yml genere : ce n'est qu'une supposition.

